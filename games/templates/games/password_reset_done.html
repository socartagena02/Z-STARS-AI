{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'games/css/registro.css' %}">
    <title>Confirmación</title>
</head>
<body class="login-page">
    <div class="login-wrapper">
        <div class="card login-card shadow-lg">
            <div class="card-body p-4">
                <h2 class="text-center mb-4 fw-bold">Listo</h2>
                
                {% if success %}
                    <div class="alert alert-success">
                        {{ mensaje }}
                    </div>
                    <p class="text-center">
                        <a href="{% url 'iniciosesion' %}" class="btn btn-primary">Ir al Login</a>
                    </p>
                {% else %}
                    <div class="alert alert-info">
                        {{ mensaje }}
                    </div>
                    <p class="text-center">
                        <a href="{% url 'iniciosesion' %}" class="btn btn-primary">Volver al Login</a>
                    </p>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
