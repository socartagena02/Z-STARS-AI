{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{% static 'games/css/simon_dice.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <title>Simón Dice</title>
    <style>
        .hidden { display: none !important; }
        .grid-basico { grid-template-columns: repeat(2, 1fr); }
        .grid-avanzado { grid-template-columns: repeat(3, 1fr); }
    </style>
</head>
<body>

    <div id="pantalla-menu" class="container">
        <div class="titulos">
            <button onclick="window.location.href='{% url 'menu_juegos' %}'">
                <i class="bi bi-house"></i> Volver al menú
            </button>
            <h2>Simón dice</h2>
            <h3>Seleccione un nivel</h3>
        </div>
        
        <div id="levels-container">
            <div id="basico" class="level-btn" onclick="iniciarJuego('basico')">Básico</div>
            <div id="intermedio" class="level-btn" onclick="iniciarJuego('intermedio')">Intermedio</div>
            <div id="avanzado" class="level-btn" onclick="iniciarJuego('avanzado')">Avanzado</div>
        </div>
    </div>

    <div id="pantalla-juego" class="container hidden">
        <button class="btn-back" onclick="volverAlMenu()">
            <i class="bi bi-arrow-left"></i> Cambiar Nivel
        </button>

        <h1 id="titulo-dinamico">Simón Dice</h1>

        <div class="stats-container">
            <div id="score-display">Puntos: <span id="score">0</span></div>
            <div id="level-display">Nivel: <span id="level">1</span></div>
        </div>
        
        <div id="game" class="grid-avanzado">
            <div id="purple" class="colorButton"></div>
            <div id="blue" class="colorButton"></div>
            <div id="yellow" class="colorButton"></div>
            <div id="green" class="colorButton"></div>
            <div id="orange" class="colorButton"></div>
            <div id="red" class="colorButton"></div>
            <div id="pink" class="colorButton"></div>
            <div id="turquese" class="colorButton"></div>
            <div id="cyan" class="colorButton"></div>
        </div>
        
        <div id="start-game">Iniciar Juego</div>
    </div>
    <audio></audio>
    <script src="{% static 'games/js/utils.js' %}"></script>
    <script src="{% static 'games/js/simon_dice.js' %}"></script>
</body>
</html>
