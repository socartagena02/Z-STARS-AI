{% load static %} 
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'games/css/registro.css' %}">
    <title>Recuperar Contraseña</title>
</head>
<body class="login-page">
    <div class="login-wrapper">
        <div class="card login-card shadow-lg">
            <div class="card-body p-4">
                <h2 class="text-center mb-4 fw-bold">Recuperar Contraseña</h2>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" required>
                        <small class="text-muted">Ingresa el email asociado a tu cuenta</small>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Enviar link de recuperación</button>
                </form>
                <hr>
                <p class="text-center">
                    <a href="{% url 'iniciosesion' %}">volver al login</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
