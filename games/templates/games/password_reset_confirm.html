{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'games/css/registro.css' %}">
    <title>Nueva Contraseña</title>
</head>
<body class="login-page">
    <div class="login-wrapper">
        <div class"card login-card shadow-lg">
            <div class="card-body p-4">
                <h2 class="text-center mb-4 fw-bold">Establecer contraseña</h2>
                {% if expired %}
                    <div class="alert alert-danger">
                        El link ha expirado. <a href="{% url 'password_reset_request' %}">Solicita uno nuevo</a>
                    </div>
                {% elif error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                {% if not expired and not error %}
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label>Nueva contraseña</label>
                            <input type="password" name="password1" class="form-control" required minlength="8">
                            <small class="text-muted">Mínimo 8 caracteres</small>
                        </div>
                        <div class="mb-3">
                            <label>Confirmar contraseña</label>
                            <input type="password" name="password2" class="form-control" required minlength="8">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Cambiar contraseña</button>
                    </form>
            </div>
        </div>
    </div>
</body>
</html>
